# ============================================================
# Render Blueprint — AI Travel Guide (Strapi + Streamlit)
# ============================================================
# Bu dosya Render Dashboard'da "New > Blueprint" ile kullanılır.
# GitHub repo'su bağlandığında otomatik olarak tüm servisleri oluşturur.
# ============================================================

databases:
  - name: ai-travel-guide-db
    plan: free
    databaseName: strapi_db
    user: strapi_user

services:
  # ─────────────────────────────────────
  # 1. Strapi CMS Backend
  # ─────────────────────────────────────
  - type: web
    name: ai-travel-guide-strapi
    runtime: node
    plan: free
    rootDir: strapi-backend
    buildCommand: npm install && npm run build
    startCommand: npm run start
    healthCheckPath: /admin
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: 20.18.3
      - key: STRAPI_PLUGIN_I18N_INIT_LOCALE_CODE
        value: tr
      - key: DATABASE_CLIENT
        value: postgres
      - key: DATABASE_URL
        fromDatabase:
          name: ai-travel-guide-db
          property: connectionString
      - key: APP_KEYS
        generateValue: true
      - key: API_TOKEN_SALT
        generateValue: true
      - key: ADMIN_JWT_SECRET
        generateValue: true
      - key: TRANSFER_TOKEN_SALT
        generateValue: true
      - key: JWT_SECRET
        generateValue: true
      - key: UPLOAD_PROVIDER
        value: cloudinary
      - key: CLOUDINARY_NAME
        sync: false
      - key: CLOUDINARY_KEY
        sync: false
      - key: CLOUDINARY_SECRET
        sync: false

  # ─────────────────────────────────────
  # 2. Streamlit Frontend
  # ─────────────────────────────────────
  - type: web
    name: ai-travel-guide-frontend
    runtime: python
    plan: free
    rootDir: frontend-streamlit
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run app.py --server.port=$PORT --server.address=0.0.0.0 --server.headless=true
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.12
      - key: STRAPI_API_TOKEN
        sync: false
      - key: STRAPI_INTERNAL_HOSTPORT
        fromService:
          name: ai-travel-guide-strapi
          type: web
          property: hostport
          # Private Render network address, consumed as http://host:port by the Streamlit app.
